<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>personal-site</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // Encodes the path into a query string and redirects to index.html
      // pathSegmentsToKeep = 1 keeps the /personal-site/ repo prefix
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
